services:
  db:
    image: postgres:16
    container_name: atmos-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-atmos}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-atmospass}
      - POSTGRES_DB=${DB_NAME:-primesdb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-atmos} -d ${DB_NAME:-primesdb}"]
      interval: 5s
      timeout: 5s
      retries: 3

  vpn:
    # UPDATED: Using a stable legacy tag to fix macOS Docker routing bugs
    image: lscr.io/linuxserver/wireguard:v1.0.20210914-ls22
    container_name: atmos-vpn
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - SERVERURL=${HOST_IP:-127.0.0.1}
      - SERVERPORT=51820
      - PEERS=1
      - PEERDNS=1.1.1.1
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=10.13.13.0/24
    ports:
      - "51820:51820/udp"
      - "8000:8000"
    volumes:
      - ./config:/config
    restart: always

  app:
    build: .
    container_name: atmos-service
    network_mode: "service:vpn"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+psycopg://${DB_USER:-atmos}:${DB_PASSWORD:-atmospass}@atmos-db:5432/${DB_NAME:-primesdb}
    restart: always